services:
  - type: web
    name: random-connect
    env: node
    buildCommand: npm install && npm run build
    preDeployCommand: npm run db:migrate
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: SESSION_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
       - key: STORAGE_BACKEND
         sync: false
       - key: STORAGE_BASE_URL
         sync: false
       - key: STORAGE_TOKEN
         sync: false
       - key: PG_IPV4_HOST
         sync: false
  - type: web
    name: random-connect-api
    env: node
    buildCommand: npm install && npm run build
    startCommand: node dist/api.cjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: DATABASE_URL
        sync: false
      - key: STORAGE_SERVER_TOKEN
        sync: false
      - key: API_CORS_ORIGIN
        sync: false
      - key: PG_IPV4_HOST
        sync: false
